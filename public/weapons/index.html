let manYaw=0, manPitch=0, autospin=true, dragging=false, lastX=0, lastY=0;

cvs.addEventListener('pointerdown',e=>{ dragging=true; autospin=false; lastX=e.clientX; lastY=e.clientY; cvs.style.cursor='grabbing'; try{cvs.setPointerCapture(e.pointerId);}catch(_){} });

/* ---- UI + per-weapon voice feedback ---- */
const nameEl=document.getElementById('name'),subEl=document.getElementById('sub'),descEl=document.getElementById('desc'),dotsEl=document.getElementById('dots'),countEl=document.getElementById('count');
const recBtn=document.getElementById('recBtn'),playBtn=document.getElementById('playBtn'),recInfo=document.getElementById('recInfo'),fbText=document.getElementById('fbText'),sendBtn=document.getElementById('sendBtn');
W.forEach((w,i)=>{ const d=document.createElement('div'); d.className='dot'; d.onclick=()=>set(i); dotsEl.appendChild(d); });
const fb={}; let mediaStream=null, mr=null, recKey=null, recT0=0, recTimer=0;
const WORKAPP='https://thework.pages.dev/rant', FB_PW='oliverNCA2026';  // uploads via the Work app voice pipeline (Cloudflare; old theworkapp.netlify.app is deleted) → local Whisper transcribes → bladefall/_feedback
function fmtT(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
async function uploadFb(key,n,name,blob,mime,secs){
  const rec=fb[key]; if(rec){ rec.sending=true; rec.err=false; } paintRec();
  try{
    const b64=await new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(String(fr.result).split(',')[1]||''); fr.onerror=rej; fr.readAsDataURL(blob); });
    if(!b64) throw 0;
    const id='wf-'+String(n).padStart(2,'0')+'-'+key+'-'+Date.now(), SLICE=3000000, parts=Math.max(1,Math.ceil(b64.length/SLICE));
    for(let p=0;p<parts;p++){
      const r=await fetch(WORKAPP,{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',
        body:JSON.stringify({password:FB_PW,action:'upload',id,part:p,parts,mime,secs,audioB64:b64.slice(p*SLICE,(p+1)*SLICE),ctx:{kind:'weaponFeedback',weapon:key,name,n},at:new Date().toISOString()})});
      if(!r.ok) throw new Error('http '+r.status);
    }
    if(fb[key]){ fb[key].sent=true; fb[key].sending=false; }
  }catch(e){ if(fb[key]){ fb[key].sent=false; fb[key].sending=false; fb[key].err=true; } }
  paintRec();
}
async function toggleRec(){
  if(recKey){ mr.stop(); return; }                       // stop the active recording
  try{ if(!mediaStream) mediaStream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ recInfo.textContent='⚠ allow microphone access, then tap again'; return; }
  const key=W[idx].key, n=idx+1, name=W[idx].name, chunks=[];
  let opt; if(window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) opt={mimeType:'audio/webm;codecs=opus',audioBitsPerSecond:48000};
  else if(window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported('audio/webm')) opt={mimeType:'audio/webm'};
  mr=new MediaRecorder(mediaStream,opt);
  mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
  mr.onstop=()=>{ const mime=(mr.mimeType||'audio/mp4'), secs=Math.round((Date.now()-recT0)/1000), blob=new Blob(chunks,{type:mime});
    if(fb[key]&&fb[key].url) URL.revokeObjectURL(fb[key].url);
    recKey=null; clearInterval(recTimer);
    if(secs<1||!blob.size){ paintRec(); return; }
    fb[key]=Object.assign(fb[key]||{},{blob,url:URL.createObjectURL(blob),secs,sent:false}); paintRec();
    uploadFb(key,n,name,blob,mime,secs); };                // → straight to Claude, no download
  recKey=key; recT0=Date.now(); mr.start(); recTimer=setInterval(paintRec,300); paintRec();
}
function paintRec(){ const key=W[idx].key, f=fb[key];
  if(recKey===key){ recBtn.classList.add('rec'); recBtn.textContent='⏹ '+fmtT(Math.floor((Date.now()-recT0)/1000)); }
  else { recBtn.classList.remove('rec'); recBtn.textContent='🎙'; }
  let msg;
  if(recKey===key) msg='recording… speak your feedback';
  else if(f&&f.sending) msg='⤴ sending voice to Claude…';
  else if(f&&f.err) msg='⚠ voice send failed — tap 🎙 to retry';
  else if(f&&f.textSending) msg='⤴ sending note…';
  else if(f&&f.textErr) msg='⚠ note send failed — tap ➤ to retry';
  else if(f&&f.sent&&f.textSent) msg='✓ voice + note sent to Claude';
  else if(f&&f.sent) msg='✓ voice sent · ▶ to review';
  else if(f&&f.textSent) msg='✓ note sent to Claude';
  else msg='type a note or tap 🎙 to record — both reach Claude';
  recInfo.textContent=msg;
  playBtn.style.display=(f&&f.url)?'':'none';
  [...dotsEl.children].forEach((d,k)=>{ const ff=fb[W[k].key]; d.classList.toggle('has',!!(ff&&(ff.sent||ff.textSent))); }); }
recBtn.onclick=toggleRec;
playBtn.onclick=()=>{ const f=fb[W[idx].key]; if(f&&f.url) new Audio(f.url).play(); };
function autoGrow(){ fbText.style.height='auto'; fbText.style.height=Math.min(110,fbText.scrollHeight)+'px'; }
fbText.addEventListener('input',()=>{ (fb[W[idx].key]=fb[W[idx].key]||{}).draft=fbText.value; autoGrow(); });
async function sendText(){ const key=W[idx].key, n=idx+1, name=W[idx].name, txt=fbText.value.trim(); if(!txt) return;
  const f=(fb[key]=fb[key]||{}); f.textSending=true; f.textErr=false; paintRec();
  try{
    const id='wf-'+String(n).padStart(2,'0')+'-'+key+'-t'+Date.now();
    const r=await fetch(WORKAPP,{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',
      body:JSON.stringify({password:FB_PW,action:'text',id,text:txt,ctx:{kind:'weaponFeedback',weapon:key,name,n},at:new Date().toISOString()})});
    if(!r.ok) throw new Error('http '+r.status);
    f.textSent=true; f.textSending=false; f.draft=''; fbText.value=''; autoGrow();
  }catch(e){ f.textSending=false; f.textErr=true; }
  paintRec(); }
sendBtn.onclick=sendText;
fbText.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendText(); } });
function set(i){ if(recKey&&mr) mr.stop(); idx=(i+W.length)%W.length; const it=W[idx];
  manYaw=0; manPitch=0; autospin=true;                    // fresh presentation per weapon
  nameEl.textContent=it.name; subEl.textContent=it.sub+' · glow shown: sample (rarity-driven in game)'; descEl.textContent=it.desc;
  countEl.textContent=(idx+1)+' / '+W.length;
  [...dotsEl.children].forEach((d,k)=>d.classList.toggle('on',k===idx));
  fbText.value=(fb[it.key]&&fb[it.key].draft)||''; autoGrow();
  paintRec(); }
document.getElementById('prev').onclick=()=>set(idx-1);
document.getElementById('next').onclick=()=>set(idx+1);
addEventListener('keydown',e=>{ if(e.target&&(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'))return; if(e.key==='ArrowLeft')set(idx-1); if(e.key==='ArrowRight')set(idx+1); });
window.__WS={set,get idx(){return idx;},count:W.length,names:W.map(w=>w.name),fb};
resize(); set(0); render();
