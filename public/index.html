<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BLADEFALL</title>
<meta name="theme-color" content="#0b0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
  :root{
    --bg:#0b0c10; --ink:#f3f1ea; --muted:#8b8f9a;
    --amber:#e8a33d; --amber-dim:#5a4422;
    --hp:#e8453d; --xp:#3a9dd0; --good:#3ad07f; --danger:#ff5e54;
    --panel:#15161c; --line:#2a2c36;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    touch-action:none;overscroll-behavior:none;position:fixed;width:100%;}
  #game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  #hud{position:absolute;left:0;right:0;top:0;padding:calc(env(safe-area-inset-top) + 8px) 12px 0;pointer-events:none;z-index:5;}
  .barwrap{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .barlabel{font-size:10px;font-weight:800;letter-spacing:.12em;width:26px;color:var(--muted);}
  .bar{flex:1;height:12px;background:#0006;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;border-radius:8px;transition:width .12s linear;}
  #hpfill{background:linear-gradient(90deg,#ff6a60,var(--hp));}
  #xpfill{background:linear-gradient(90deg,#56b6e6,var(--xp));}
  #hud .meta{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
  #hud .left{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  #lvlbadge{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--amber);background:var(--amber-dim);padding:3px 8px;border-radius:999px;}
  #weapontag{font-size:11px;font-weight:700;color:var(--ink);opacity:.95;}
  #armortag{font-size:11px;font-weight:700;color:#aeb9c6;display:flex;align-items:center;gap:4px;}
  #armortag .pip{width:7px;height:7px;border-radius:2px;display:inline-block;background:#333;}
  #stagetag{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  #bosshpwrap{position:absolute;left:50%;top:calc(env(safe-area-inset-top) + 64px);transform:translateX(-50%);width:min(560px,86vw);display:none;z-index:5;pointer-events:none;}
  #bosshpwrap.on{display:block;}
  #bossname{text-align:center;font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--danger);margin-bottom:4px;text-shadow:0 1px 4px #000;}
  #bosshp{height:10px;background:#0008;border:1px solid #6b1c18;border-radius:6px;overflow:hidden;}
  #bosshp > i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ff7a52,#c9281f);}
  #controls{position:absolute;left:0;right:0;bottom:0;height:100%;pointer-events:none;z-index:6;}
  .btn{position:absolute;pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(28,30,38,.42);border:1.5px solid rgba(255,255,255,.14);color:#fff;font-weight:800;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);font-size:13px;letter-spacing:.04em;transition:transform .05s,background .08s;}
  .btn.pressed{background:rgba(232,163,61,.55);border-color:#f3c272;transform:scale(.94);}
  .btn svg{width:46%;height:46%;fill:currentColor;}
  #joyzone{position:absolute;left:0;bottom:0;width:46%;height:46%;pointer-events:auto;}
  #joy{position:absolute;width:104px;height:104px;border-radius:50%;background:rgba(28,30,38,.35);border:1.5px solid rgba(255,255,255,.12);display:none;pointer-events:none;}
  #joyknob{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(232,163,61,.5);border:1.5px solid #f3c272;left:29px;top:29px;pointer-events:none;}
  #bAttack{width:86px;height:86px;right:calc(env(safe-area-inset-right) + 16px);bottom:calc(env(safe-area-inset-bottom) + 26px);font-size:15px;background:rgba(232,69,61,.34);border-color:rgba(255,140,134,.4);}
  #bAttack.pressed{background:rgba(232,69,61,.62);}
  #bAttack.ranged{background:rgba(120,90,210,.34);border-color:rgba(170,150,240,.45);}
  #bAttack.ranged.pressed{background:rgba(120,90,210,.62);}
  #bJump{width:66px;height:66px;right:calc(env(safe-area-inset-right) + 104px);bottom:calc(env(safe-area-inset-bottom) + 92px);}
  #bDodge{width:62px;height:62px;right:calc(env(safe-area-inset-right) + 110px);bottom:calc(env(safe-area-inset-bottom) + 18px);font-size:11px;background:rgba(58,157,208,.3);border-color:rgba(120,200,235,.4);}
  #bDodge.pressed{background:rgba(58,157,208,.6);}
  #bDodge.cooling{opacity:.4;}
  .tog{width:58px;height:30px;border-radius:9px;font-size:9.5px;letter-spacing:.04em;right:calc(env(safe-area-inset-right) + 10px);background:rgba(28,30,38,.5);}
  #bAuto{top:38%;}
  #bKeep{top:calc(38% + 38px);}
  .tog.on{background:rgba(232,163,61,.62);border-color:#f3c272;color:#0b0c10;}
  .hide{display:none !important;}
  #overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(6,7,10,.82);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);text-align:center;overflow:auto;touch-action:pan-y;}
  #overlay.hide{display:none;}
  .card{width:100%;max-width:380px;}
  .title{font-size:clamp(34px,11vw,52px);font-weight:900;letter-spacing:.04em;margin:0;background:linear-gradient(180deg,#f7d79a,var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 4px 24px rgba(232,163,61,.25);}
  .subtitle{color:var(--muted);font-size:13px;letter-spacing:.22em;text-transform:uppercase;margin:6px 0 22px;}
  .bigbtn{display:block;width:100%;padding:15px;margin:9px 0;border:none;border-radius:14px;font-size:16px;font-weight:800;letter-spacing:.02em;cursor:pointer;color:#0b0c10;background:var(--amber);}
  .bigbtn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
  .bigbtn:active{transform:scale(.98);}
  .ovh{font-size:24px;font-weight:900;margin:0 0 4px;letter-spacing:.02em;}
  .ovsub{color:var(--muted);font-size:14px;margin:0 0 20px;line-height:1.5;}
  .choices{display:flex;flex-direction:column;gap:12px;}
  .choice{padding:14px 16px;border-radius:14px;background:var(--panel);border:1.5px solid var(--line);cursor:pointer;text-align:left;transition:border-color .1s,transform .05s;}
  .choice:active{transform:scale(.985);}
  .choice .cname{font-size:16px;font-weight:800;color:var(--amber);display:flex;align-items:center;gap:8px;}
  .choice .cdesc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4;}
  .statgrid{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:0 0 20px;}
  .hint{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.6;}
  .vsrow{display:flex;justify-content:space-between;gap:6px;font-size:12px;color:var(--muted);margin:3px 0;}
  .vsrow b{color:var(--ink);}
  .up{color:var(--good);} .down{color:var(--danger);}
  #toast{position:absolute;left:50%;top:30%;transform:translateX(-50%);z-index:25;background:rgba(20,21,27,.92);border:1px solid var(--amber-dim);color:var(--amber);font-weight:800;font-size:13px;letter-spacing:.04em;padding:10px 18px;border-radius:12px;opacity:0;transition:opacity .2s,top .2s;pointer-events:none;text-align:center;max-width:80vw;}
  #toast.show{opacity:1;top:24%;}
  #pausebtn{position:absolute;top:calc(env(safe-area-inset-top) + 8px);right:12px;z-index:7;width:34px;height:34px;border-radius:9px;background:rgba(28,30,38,.5);border:1px solid var(--line);color:var(--ink);font-size:13px;display:flex;align-items:center;justify-content:center;pointer-events:auto;}
  .skingrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:4px 0 16px;}
  .skintile{border:1.5px solid var(--line);border-radius:14px;padding:8px 4px 9px;background:var(--panel);cursor:pointer;text-align:center;}
  .skintile.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber) inset;}
  .skintile.lock{opacity:.6;}
  .skintile.godt{border-color:#ffd24a;box-shadow:0 0 14px #ffd24a66;}
  .skintile .av{width:46px;height:55px;display:block;margin:0 auto 2px;border:none;border-radius:0;background:none;}
  .skintile .sn{font-size:11px;font-weight:800;}
  .skintile .lk{font-size:8.5px;color:var(--muted);margin-top:1px;line-height:1.2;}
  .achlist{text-align:left;max-height:54vh;overflow:auto;margin:2px 0 14px;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
  .achrow{display:flex;gap:10px;align-items:flex-start;padding:9px 6px;border-bottom:1px solid var(--line);}
  .achrow .ic{font-size:17px;width:20px;text-align:center;}
  .achrow .at{font-size:14px;font-weight:800;}
  .achrow .ad{font-size:11px;color:var(--muted);margin-top:1px;}
  .achrow.done .at{color:var(--good);}
  .achrow.todo{opacity:.65;}
  .gearrow{display:flex;gap:10px;align-items:flex-start;text-align:left;padding:10px 6px;border-bottom:1px solid var(--line);}
  .gearrow .gi{font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--muted);width:48px;flex:0 0 auto;text-transform:uppercase;padding-top:2px;}
  .gearrow .gn{font-size:14px;font-weight:800;}
  .gearrow .gd{font-size:11px;color:var(--muted);margin-top:1px;line-height:1.35;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" class="hide">
  <div class="barwrap"><span class="barlabel">HP</span><div class="bar"><i id="hpfill"></i></div></div>
  <div class="barwrap"><span class="barlabel">XP</span><div class="bar"><i id="xpfill"></i></div></div>
  <div class="barwrap" style="margin-bottom:2px"><span class="barlabel" style="font-size:8.5px">MAP</span><div class="bar" style="height:5px"><i id="progfill" style="background:#8b8f9a"></i></div></div>
  <div class="meta"><div class="left"><span id="lvlbadge">LV 1</span><span id="weapontag">Rusty Sword</span><span id="armortag"></span></div><span id="stagetag">Stage 1</span></div>
</div>
<div id="bosshpwrap"><div id="bossname">Boss</div><div id="bosshp"><i></i></div></div>
<button id="pausebtn" class="hide">II</button>
<div id="controls" class="hide">
  <div id="joyzone"><div id="joy"><div id="joyknob"></div></div></div>
  <button class="btn" id="bDodge">DODGE</button>
  <button class="btn" id="bJump"><svg viewBox="0 0 24 24"><path d="M12 4l7 8h-4v8h-6v-8H5z"/></svg></button>
  <button class="btn" id="bAttack">SLASH</button>
  <button class="btn tog" id="bAuto">AUTO (L)</button>
  <button class="btn tog" id="bKeep">KEEP</button>
</div>
<div id="toast"></div>
<div id="overlay"><div class="card" id="ovcard"></div></div>
<script>
(function(){
"use strict";
/* ============================================================
   BLADEFALL — 2D action-RPG (single-file canvas PWA).
   v3: steep rarity, elements + resistances + neutral, elemental
   monsters, 3-slot armor (nerfed), faster bows, unique skins,
   detailed bosses, god-skin cheat. Hitboxes preserved.
   ============================================================ */
const VERSION='4.1.2';
const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
let VW=0,VH=0,DPR=1,GROUND_FAR=0,GROUND_NEAR=0;
const DEPTH=210; // walkable depth band (world units): z=0 far ... z=DEPTH near
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  VW=window.innerWidth; VH=window.innerHeight;
  canvas.width=Math.round(VW*DPR); canvas.height=Math.round(VH*DPR);
  canvas.style.width=VW+'px'; canvas.style.height=VH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  GROUND_NEAR=VH-Math.max(96,VH*0.13);
  GROUND_FAR=GROUND_NEAR-Math.max(140,VH*0.24);
}
function gy(z){ return GROUND_FAR+(z/DEPTH)*(GROUND_NEAR-GROUND_FAR); } // ground screen-y at depth z
function scaleAt(z){ return 0.80+0.32*(z/DEPTH); }                      // perspective scale at depth z
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,120));
/* iOS Safari/Chrome ignore user-scalable=no, so kill zoom gestures in JS. Menus (#overlay) keep their scroll. */
['gesturestart','gesturechange','gestureend'].forEach(t=>document.addEventListener(t,e=>e.preventDefault()));
let _lastTouchEnd=0;
document.addEventListener('touchend',e=>{
  if(e.target.closest&&e.target.closest('#overlay')) return;
  const now=Date.now();
  if(now-_lastTouchEnd<=300) e.preventDefault();
  _lastTouchEnd=now;
},{passive:false});
resize();

/* ---------------- Persistence ---------------- */
const SAVE_KEY='bladefall_v1';
function loadSave(){ try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{};}catch(e){return {};} }
function persist(){ try{localStorage.setItem(SAVE_KEY,JSON.stringify(meta));}catch(e){} }
const meta=Object.assign({
  ngPlus:0,bestStage:0,soundOn:true,unlockedSkins:['knight'],selectedSkin:'knight',
  achievements:{},totalKills:0,bossKills:0,kingKills:0,tyrantKills:0,
  magicBossKills:0,rangedBossKills:0,legendaryFound:0,flawlessStages:0,maxLevel:1,lastNgHp:1,lastNgDmg:1,autoAttack:false,autoKeep:false,run:null
},loadSave());
if(!meta.achievements) meta.achievements={};
if(!Array.isArray(meta.unlockedSkins)) meta.unlockedSkins=['knight'];
if(!meta.unlockedSkins.includes('knight')) meta.unlockedSkins.unshift('knight');
// v2->v3: discard incompatible saved run (old single-armor model)
if(meta.run && (!meta.run.p || typeof meta.run.p.weapon!=='object' || !meta.run.p.weapon.cls || !meta.run.p.gear)) meta.run=null;

/* ---------------- Audio (procedural WebAudio: noise + filters + sweeps) ---------------- */
let actx=null, master=null, noiseBuf=null;
function initAudio(){ if(!actx){ try{
  actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain(); master.gain.value=0.6; master.connect(actx.destination);
  noiseBuf=actx.createBuffer(1,actx.sampleRate,actx.sampleRate);
  const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
}catch(e){} } }
function sOn(){ return meta.soundOn && actx; }
function env(g,t,a,peak,dur){ g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(peak,t+a); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); }
function tone(o){ if(!sOn()) return; try{ const t=actx.currentTime+(o.at||0);
  const os=actx.createOscillator(),g=actx.createGain();
  os.type=o.type||'sine'; if(o.detune) os.detune.value=o.detune;
  os.frequency.setValueAtTime(Math.max(20,o.f0),t);
  if(o.f1) os.frequency.exponentialRampToValueAtTime(Math.max(20,o.f1),t+o.dur);
  env(g,t,o.a||0.006,o.vol||0.07,o.dur);
  os.connect(g); g.connect(master); os.start(t); os.stop(t+o.dur+0.03); }catch(e){}
}
function noise(o){ if(!sOn()) return; try{ const t=actx.currentTime+(o.at||0);
  const s=actx.createBufferSource(); s.buffer=noiseBuf;
  const f=actx.createBiquadFilter(); f.type=o.type||'bandpass'; f.Q.value=o.q||1;
  f.frequency.setValueAtTime(o.f0||1000,t);
  if(o.f1) f.frequency.exponentialRampToValueAtTime(Math.max(40,o.f1),t+o.dur);
  const g=actx.createGain(); env(g,t,o.a||0.004,o.vol||0.1,o.dur);
  s.connect(f); f.connect(g); g.connect(master); s.start(t,Math.random()*0.5); s.stop(t+o.dur+0.03); }catch(e){}
}
const SFX={
  slash(){ noise({dur:0.16,f0:2600,f1:320,q:1.4,vol:0.15,a:0.012});
    tone({f0:1050,f1:260,dur:0.1,type:'triangle',vol:0.018}); },
  shoot(){ tone({f0:1500,f1:280,dur:0.07,type:'triangle',vol:0.06});
    noise({dur:0.05,f0:3200,f1:1100,q:2.4,vol:0.09,a:0.001}); },
  magic(el){
    if(el==='fire'){ tone({f0:150,f1:46,dur:0.28,type:'sawtooth',vol:0.10});
      noise({dur:0.30,f0:900,f1:180,type:'lowpass',vol:0.13,a:0.01}); }
    else if(el==='ice'){ tone({f0:1250,dur:0.26,type:'sine',vol:0.05}); tone({f0:1870,dur:0.3,type:'sine',vol:0.03,at:0.02,detune:6});
      noise({dur:0.22,f0:5200,f1:8200,type:'highpass',vol:0.045,a:0.008}); }
    else if(el==='storm'){ tone({f0:1900,f1:170,dur:0.08,type:'sawtooth',vol:0.07});
      noise({dur:0.05,f0:3400,q:5,vol:0.1,a:0.001}); noise({dur:0.04,f0:2600,q:5,vol:0.08,at:0.05,a:0.001}); }
    else if(el==='void'){ tone({f0:170,f1:52,dur:0.32,type:'sine',vol:0.10});
      noise({dur:0.28,f0:340,f1:1900,q:1.6,vol:0.06,a:0.02}); }
    else if(el==='poison'){ tone({f0:520,f1:300,dur:0.12,type:'sine',vol:0.06}); tone({f0:390,f1:230,dur:0.13,type:'sine',vol:0.05,at:0.06});
      noise({dur:0.2,f0:600,f1:240,type:'lowpass',vol:0.06,a:0.01}); }
    else if(el==='holy'){ tone({f0:660,dur:0.3,type:'sine',vol:0.05}); tone({f0:990,dur:0.34,type:'sine',vol:0.035,at:0.02});
      noise({dur:0.26,f0:6000,f1:9000,type:'highpass',vol:0.035,a:0.01}); }
    else { tone({f0:520,f1:1040,dur:0.16,type:'sine',vol:0.05}); tone({f0:780,f1:1560,dur:0.16,type:'sine',vol:0.035,at:0.05});
      noise({dur:0.2,f0:4200,f1:7800,type:'highpass',vol:0.04,a:0.01}); }
  },
  hit(){ tone({f0:190,f1:65,dur:0.12,type:'sine',vol:0.14,a:0.002});
    noise({dur:0.06,f0:950,f1:480,q:0.9,vol:0.16,a:0.001});
    tone({f0:2100,dur:0.045,type:'square',vol:0.014,at:0.004}); },
  enemyDie(){ tone({f0:250,f1:52,dur:0.34,type:'sawtooth',vol:0.08}); tone({f0:236,f1:48,dur:0.34,type:'sawtooth',vol:0.05,detune:-14});
    noise({dur:0.14,f0:750,f1:210,type:'lowpass',vol:0.13,a:0.004,at:0.02}); },
  hurt(){ tone({f0:310,f1:110,dur:0.2,type:'sawtooth',vol:0.075});
    tone({f0:150,f1:60,dur:0.14,type:'sine',vol:0.12,a:0.002});
    noise({dur:0.08,f0:500,f1:200,type:'lowpass',vol:0.1,a:0.002}); },
  jump(){ tone({f0:230,f1:540,dur:0.13,type:'sine',vol:0.06,a:0.012});
    noise({dur:0.07,f0:700,f1:1300,q:1,vol:0.035,a:0.004}); },
  land(){ tone({f0:150,f1:55,dur:0.1,type:'sine',vol:0.08,a:0.002});
    noise({dur:0.06,f0:420,f1:170,type:'lowpass',vol:0.07,a:0.002}); },
  dodge(){ noise({dur:0.17,f0:900,f1:4200,q:1.1,vol:0.11,a:0.008});
    tone({f0:420,f1:940,dur:0.12,type:'sine',vol:0.02}); },
  growl(v){ v=v||1; const f=95+Math.random()*40;
    tone({f0:f,f1:f*0.62,dur:0.3,type:'sawtooth',vol:0.05*v}); tone({f0:f*1.02,f1:f*0.6,dur:0.3,type:'sawtooth',vol:0.035*v,detune:-16});
    noise({dur:0.26,f0:300,f1:130,type:'lowpass',vol:0.06*v,a:0.02}); },
  levelup(){ [523,659,784].forEach((f,i)=>{ tone({f0:f,dur:0.16,type:'triangle',vol:0.06,at:i*0.085}); tone({f0:f*2,dur:0.14,type:'sine',vol:0.02,at:i*0.085}); });
    noise({dur:0.3,f0:5000,f1:9000,type:'highpass',vol:0.03,a:0.02,at:0.15}); },

/* ---------------- Rarity (steep: each tier much rarer) ---------------- */
const RARITY={
  common:{name:'Common',color:'#b9c0cc',base:1000,mul:1.00,tier:0},
  uncommon:{name:'Uncommon',color:'#5fd17a',base:300,mul:1.30,tier:1},
  rare:{name:'Rare',color:'#4aa3e0',base:80,mul:1.70,tier:2},
  epic:{name:'Epic',color:'#b06bff',base:16,mul:2.25,tier:3},
  legendary:{name:'Legendary',color:'#f0a93a',base:2.6,mul:3.0,tier:4}
};
const RORDER=['common','uncommon','rare','epic','legendary'];
function rarityGlow(r){ return [0,3,6,10,15][RARITY[r].tier]; }
function elementColor(el){ return {fire:'#ff7a3a',ice:'#7fd6ff',poison:'#86e05a',arcane:'#c47bff',void:'#b06bff',storm:'#9fe0ff',holy:'#ffe9a8'}[el]||null; }
// steeper curve; depth/level/NG+ nudge it up but legendaries stay rare at all depths (applies to weapons AND armor)
function rollRarity(){
  const luck=(G?G.stageIndex*0.5:0)+(G?G.ngPlus*2.5:0)+(G?Math.floor(G.p.level/2)*0.2:0);
  const boost=1+Math.min(luck,22)*0.085;
  let pool=[],total=0;
  RORDER.forEach((r,i)=>{ const w=RARITY[r].base*Math.pow(boost,i); pool.push(w); total+=w; });
  let roll=Math.random()*total;
  for(let i=0;i<pool.length;i++){ roll-=pool[i]; if(roll<=0) return RORDER[i]; }
  return 'common';
}

/* ---------------- Elements ---------------- */
// enemy of element X resists X (×0.6) and is weak to WEAK[X] (×1.5). Neutral weapon/enemy = flat ×1.
// Void weapon: never resisted + small bonus everywhere + lifesteal (its unique passive).
const WEAK={fire:'ice',ice:'fire',poison:'holy',storm:'arcane',void:'holy',arcane:'storm',holy:'void'};
function elemMod(wEl,eEl){
  if(!wEl||!eEl) return 1;
  if(wEl==='void') return 1.15;          // void rends through resistances
  if(wEl===eEl) return 0.6;              // resisted
  if(WEAK[eEl]===wEl) return 1.5;        // weakness
  return 1;
}

  for(const a of ACHIEVEMENTS){

/* gear -> effective stats (3 slots summed) */
function recomputeArmor(p){
  const m={hp:0,speedMul:1,atkSpeedMul:1,lifesteal:0,dodgeMul:1,powerMul:1,defense:0};
  let total=0;
  if(p.gear) for(const slot of SLOTIDS){ const a=p.gear[slot]; if(!a) continue; total+=a.defense;
    for(const af of a.affixes){ if(af.stat==='hp')m.hp+=af.val; else if(af.stat==='lifesteal')m.lifesteal+=af.val;
      else if(af.stat==='speedMul')m.speedMul*=1+af.val; else if(af.stat==='atkSpeedMul')m.atkSpeedMul*=1+af.val;
      else if(af.stat==='dodgeMul')m.dodgeMul*=1-af.val; else if(af.stat==='powerMul')m.powerMul*=1+af.val; } }
  m.defense=total/(total+200);
  p.armorMods=m;
}
function isGod(p){ return p.skin==='god'; }
function effMaxHp(p){ let v=(p.maxHp+(p.armorMods?p.armorMods.hp:0)); const sp=skinP(p); if(sp&&sp.hpMul) v*=sp.hpMul; return isGod(p)?v+9000:v; }
function effPower(p){ let v=p.stats.power*(p.armorMods?p.armorMods.powerMul:1); const sp=skinP(p);
  if(sp){ if(sp.power) v*=sp.power;
    if(sp.magPower&&p.weapon&&p.weapon.sch==='mag') v*=sp.magPower;
    if(sp.rngPower&&p.weapon&&p.weapon.cls==='ranged') v*=sp.rngPower; }
  return isGod(p)?v*6:v; }
function effAtkSpeed(p){ let v=p.stats.atkSpeed*(p.armorMods?p.armorMods.atkSpeedMul:1); const sp=skinP(p); if(sp&&sp.atkSpeed) v*=sp.atkSpeed; return isGod(p)?v*1.7:v; }
function effSpeed(p){ let v=p.stats.speed*(p.armorMods?p.armorMods.speedMul:1); const sp=skinP(p); if(sp&&sp.speed) v*=sp.speed; return isGod(p)?v*1.4:v; }
function effLifesteal(p){ let v=p.stats.lifesteal+(p.armorMods?p.armorMods.lifesteal:0); const sp=skinP(p); if(sp&&sp.lifesteal) v+=sp.lifesteal; return isGod(p)?v+0.6:v; }
function effDodgeCd(p){ let v=p.stats.dodgeCd*(p.armorMods?p.armorMods.dodgeMul:1); const sp=skinP(p); if(sp&&sp.dodge) v*=sp.dodge; return isGod(p)?v*0.5:v; }
function defenseR(p){ if(isGod(p)) return 0.85; return p.armorMods?Math.min(0.5,p.armorMods.defense):0; }
function totalDefense(p){ let t=0; if(p.gear) for(const s of SLOTIDS){ if(p.gear[s]) t+=p.gear[s].defense; } return t; }
function bestGearRarity(p){ let best=-1,bc='#333'; if(p.gear) for(const s of SLOTIDS){ const a=p.gear[s]; if(a&&RARITY[a.rarity].tier>best){ best=RARITY[a.rarity].tier; bc=a.color; } } return bc; }
function powerScore(p){
  const w=p.weapon||startWeapon();
  const dps=w.dmg*effPower(p)*effAtkSpeed(p)/Math.max(0.14,w.cd), startDps=9/0.40;
  const offense=dps/startDps, toughness=(effMaxHp(p)/100)/(1-defenseR(p));
  return Math.sqrt(Math.max(0.2,offense)*Math.max(0.5,toughness));
}
function offenseScore(p){ const w=p.weapon||startWeapon(); return Math.max(1,(w.dmg*effPower(p)*effAtkSpeed(p)/Math.max(0.14,w.cd))/(9/0.40)); }
function toughnessScore(p){ return Math.max(1,(effMaxHp(p)/100)/(1-defenseR(p))); }

(function(){
  const zone=document.getElementById('joyzone'), joy=document.getElementById('joy'), knob=document.getElementById('joyknob');
  let pid=null, ox=0, oy=0; const R=46;
  function setKnob(dx,dy){ knob.style.left=(29+dx)+'px'; knob.style.top=(29+dy)+'px'; }
  zone.addEventListener('pointerdown',e=>{ if(pid!==null) return; e.preventDefault(); initAudio(); pid=e.pointerId; ox=e.clientX; oy=e.clientY;
    joy.style.display='block'; joy.style.left=(ox-zone.getBoundingClientRect().left-52)+'px'; joy.style.top=(oy-zone.getBoundingClientRect().top-52)+'px';
    setKnob(0,0); zone.setPointerCapture&&zone.setPointerCapture(e.pointerId); });

    let dx=e.clientX-ox, dy=e.clientY-oy; const m=Math.hypot(dx,dy); if(m>R){ dx*=R/m; dy*=R/m; }

/* ---------------- Combat ---------------- */
function addText(x,y,txt,color,big){ G.texts.push({x,y,txt,color,life:0.9,vy:-46,big:!!big}); }
function burst(x,y,color,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,s=40+Math.random()*160;
  G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,life:0.4+Math.random()*0.3,color,sz:2+Math.random()*3}); } }

function updateAmbient(dt,s){
  const cfg=AMBIENT[s.theme]; if(!cfg) return;
  if(!G.ambient) G.ambient=[];
  if(G.ambient.length<54 && Math.random()<cfg.n*0.5){
    G.ambient.push({x:G.cam+Math.random()*VW, y:cfg.rise?GROUND_NEAR-Math.random()*40:-8,
      vx:cfg.vx*(0.6+Math.random()*0.8), vy:cfg.vy*(0.6+Math.random()*0.8),

  }

  else if(el==='poison'){ e.burnT=3.2; e.burnDps=Math.max(2,dmg*0.14); e.burnColor='#86e05a'; }

function resolveSwing(){
  const p=G.p,w=p.weapon; if(w.cls!=='melee') return;
  if(p.atkTimer<0.26*0.35) return;

function hitEnemy(e,dmg,dir,kb,lifesteal,el){

  else { const aid=ARCHEIDS[Math.floor(Math.random()*ARCHEIDS.length)];
    G.pickups.push({x:e.x,z:e.z,weapon:makeWeapon(aid,rid),bob:0});
    if(e.boss && Math.random()<0.7){ const lr=RORDER[Math.max(0,RARITY[rid].tier-1)]; G.pickups.push({x:e.x-44,z:e.z,armor:makeArmor(lr,SLOTIDS[Math.floor(Math.random()*3)]),bob:0}); } }
}
function gainXp(n){
  const p=G.p; p.xp+=n;
  while(p.xp>=p.xpNext){ p.xp-=p.xpNext; p.level++; p.xpNext=Math.round(46+p.level*34+p.level*p.level*2);
    p.hp=Math.min(effMaxHp(p),p.hp+12); SFX.levelup(); queueLevelUp++; meta.maxLevel=Math.max(meta.maxLevel||1,p.level); }
  checkAchievements(); hudUpdate();
}
function checkStageClear(){
  if(G.portal) return;
  if(G.enemies.filter(e=>!e.dead).length===0){
    G.portal={x:STAGES[G.stageIndex].len-90,t:0};
    addText(G.p.x,gy(G.p.z)-G.p.jy-90,'STAGE CLEAR!','var(--amber)',true);
  }
}
function hurtPlayer(dmg,dir){
  const p=G.p; if(p.invuln>0||p.dodgeTimer>0) return;
  dmg=Math.max(1,Math.round(dmg*(1-defenseR(p)))); p.hp-=dmg; p.invuln=0.7; p.hurtFlash=0.3; p.vx=dir*210; p.vy=160; p.onGround=false; G.tookDamage=true; G.combo=0; G.comboT=0;
  addText(p.x,gy(p.z)-p.jy-p.h-10,'-'+dmg,'var(--danger)'); G.shake=Math.min(G.shake+10,18); SFX.hurt(); hudUpdate();
  if(p.hp<=0){ p.hp=0; p.dead=true; die(); }
}

/* ============================================================ UPDATE */
function update(dt){
  if(mode!=='play') return;
  const p=G.p,s=STAGES[G.stageIndex]; G.time+=dt;
  if(G.stageBanner>0) G.stageBanner-=dt;
  if(G.shake>0) G.shake=Math.max(0,G.shake-dt*40);
  if(p.atkTimer>0) p.atkTimer-=dt; if(p.atkCd>0) p.atkCd-=dt;
  if(p.invuln>0) p.invuln-=dt; if(p.hurtFlash>0) p.hurtFlash-=dt;
  if(p.dodgeTimer>0) p.dodgeTimer-=dt; if(p.dodgeCdT>0) p.dodgeCdT-=dt;
  const moveSpd=220*effSpeed(p), moveSpdZ=moveSpd*0.66;
  const mx=moveX(), mz=moveZ();
  if(p.dodgeTimer>0){ p.vx=p.dashX*560; p.vz=p.dashZ*380; }
  else {
    if(mx<0) p.face=-1; if(mx>0) p.face=1;
    if(mx!==0) p.vx+=mx*moveSpd*dt*8; p.vx*=0.80; if(Math.abs(p.vx)<4) p.vx=0;
    if(p.vx>moveSpd) p.vx=moveSpd; if(p.vx<-moveSpd) p.vx=-moveSpd;
    if(mz!==0) p.vz+=mz*moveSpdZ*dt*8; p.vz*=0.80; if(Math.abs(p.vz)<4) p.vz=0;
    if(p.vz>moveSpdZ) p.vz=moveSpdZ; if(p.vz<-moveSpdZ) p.vz=-moveSpdZ;
  }
  if(input.jumpEdge){ input.jumpEdge=false; if(p.onGround||p.jumps<p.maxJumps){ p.vy=560; p.onGround=false; p.jumps++; SFX.jump(); burst(p.x,gy(p.z),'#cfd6df',5); } }
  if(input.dodgeEdge){ input.dodgeEdge=false; if(p.dodgeCdT<=0){
    const m=Math.hypot(mx,mz); if(m>0.3){ p.dashX=mx/m; p.dashZ=mz/m; } else { p.dashX=p.face; p.dashZ=0; }
    p.dodgeTimer=0.20; p.invuln=Math.max(p.invuln,0.34); p.dodgeCdT=effDodgeCd(p); SFX.dodge(); burst(p.x,gy(p.z)-10,'var(--xp)',8); } }
  document.getElementById('bDodge').classList.toggle('cooling',p.dodgeCdT>0);
  if((input.attack||meta.autoAttack) && p.atkCd<=0 && p.dodgeTimer<=0) playerAttack(input.attack?1:1.176); // auto = 15% slower rate
  if(p.atkTimer>0) resolveSwing();
  if(!p.onGround){ p.vy-=1500*dt; }
  p.x+=p.vx*dt; p.z+=p.vz*dt; p.jy+=p.vy*dt;
  if(p.jy<=0 && !p.onGround){ p.jy=0; p.vy=0; burst(p.x,gy(p.z),'#888',4); SFX.land(); p.onGround=true; p.jumps=0; }
  if(p.x<24) p.x=24; if(p.x>s.len-24) p.x=s.len-24;
  if(p.z<0) p.z=0; if(p.z>DEPTH) p.z=DEPTH;
  const spd2=Math.hypot(p.vx,p.vz);
  if(spd2>20 && p.onGround) p.runAnim+=dt*spd2*0.04; else p.runAnim*=0.8;
  const target=Math.max(0,Math.min(p.x-VW*0.36,s.len-VW));
  G.cam+=(target-G.cam)*Math.min(1,dt*8);
  // combo timer
  if(G.comboT>0){ G.comboT-=dt; if(G.comboT<=0) G.combo=0; }
  // ambient theme particles
  updateAmbient(dt,s);
  // enemies
  for(const e of G.enemies){
    if(e.dead) continue;
    if(!e.active && Math.abs(e.x-p.x)<VW*0.75){ e.active=true; if(e.boss) onBossActivate(e); }
    if(!e.active) continue;
    if(e.hitFlash>0) e.hitFlash-=dt;
    if(e.burnT>0){ e.burnT-=dt; e.burnAcc+=e.burnDps*dt; if(e.burnAcc>=1){ const d=Math.floor(e.burnAcc); e.burnAcc-=d; e.hp-=d; if(Math.random()<0.4) G.particles.push({x:e.x+(Math.random()-0.5)*e.w,y:gy(e.z)-e.jy-Math.random()*e.h,vx:0,vy:-40,life:0.3,color:e.burnColor||'#ff7a3a',sz:2}); if(e.hp<=0){ killEnemy(e); continue; } } }
    let eff=e.speed*(e.slowT>0?0.5:1); if(e.slowT>0) e.slowT-=dt;
    if(e.stunT>0){ e.stunT-=dt; eff=0; }
    const dx=p.x-e.x, dir=Math.sign(dx)||1; e.face=dir;
    const dzs=Math.sign(p.z-e.z)||0;
    if(Math.abs(e.hurtKb)>1){ e.x+=e.hurtKb*dt; e.hurtKb*=0.86; }
    if(e.kind==='fly'){ e.bob+=dt*2.4; const tj=Math.max(0,44+Math.sin(e.bob)*52-8);
      e.x+=dir*eff*dt; e.z+=dzs*Math.min(Math.abs(p.z-e.z),eff*0.6*dt);
      e.jy+=Math.sign(tj-e.jy)*Math.min(Math.abs(tj-e.jy),eff*1.5*dt); }
    else if(e.kind==='walk'){ e.x+=dir*eff*dt; e.z+=dzs*Math.min(Math.abs(p.z-e.z),eff*0.65*dt); e.jy=0; }
    else if(e.boss){ updateBoss(e,dt,p,dir,eff); }
    if(e.z<0) e.z=0; if(e.z>DEPTH) e.z=DEPTH;
    if(e.x<24) e.x=24; if(e.x>s.len-24) e.x=s.len-24; // kite bosses can no longer retreat past the stage edge
    if(!e.dead && Math.abs(e.x-p.x)<(e.w/2+p.w/2) && Math.abs(e.z-p.z)<26 && vOverlap(e,p))
      hurtPlayer((e.boss&&e.lunge>0)?e.dmg*1.6:e.dmg,dir);
  }
  // projectiles
  for(const pr of G.projectiles){
    pr.life-=dt; if(pr.gravity) pr.vjy-=pr.gravity*dt;
    pr.x+=pr.vx*dt; pr.z+=(pr.vz||0)*dt; pr.jy+=(pr.vjy||0)*dt;
    if(pr.owner==='player'){
      for(const e of G.enemies){ if(e.dead||pr.hitSet.indexOf(e)>=0) continue;
        if(Math.abs(e.x-pr.x)<(e.w/2+pr.size) && Math.abs(e.z-pr.z)<28 && Math.abs(pr.jy-(e.jy+e.h/2))<(e.h/2+pr.size)){
          pr.hitSet.push(e); hitEnemy(e,pr.dmg,Math.sign(pr.vx)||1,pr.kb,effLifesteal(G.p),pr.el);
          if(pr.pierce>0) pr.pierce--; else { pr.life=0; break; } } }
    } else {
      if(p.invuln<=0 && p.dodgeTimer<=0 && Math.abs(p.x-pr.x)<(p.w/2+pr.size) && Math.abs(p.z-pr.z)<28 && Math.abs(pr.jy-(p.jy+p.h/2))<(p.h/2+pr.size)){ hurtPlayer(pr.dmg,Math.sign(pr.vx)||1); pr.life=0; }
    }
    if(pr.jy<-4 || pr.z<-30 || pr.z>DEPTH+30) pr.life=0;
  }
  G.projectiles=G.projectiles.filter(pr=>pr.life>0);
  // pickups
  for(const pk of G.pickups){ pk.bob=(pk.bob||0)+dt*4;
    if(Math.abs(pk.x-p.x)<34 && Math.abs((pk.z==null?p.z:pk.z)-p.z)<46 && p.jy<50){ if(pk.weapon) offerWeapon(pk.weapon); else if(pk.armor) offerArmor(pk.armor); pk.taken=true; } }
  G.pickups=G.pickups.filter(pk=>!pk.taken);
  // portal
  if(G.portal){ G.portal.t+=dt; if(Math.abs(p.x-G.portal.x)<40) nextStage(); }
  // particles & texts
  for(const pt of G.particles){ pt.vy+=600*dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt; }
  G.particles=G.particles.filter(pt=>pt.life>0);
  for(const t of G.texts){ t.y+=t.vy*dt; t.vy*=0.92; t.life-=dt; }
  G.texts=G.texts.filter(t=>t.life>0);
  if(queueLevelUp>0 && mode==='play'){ queueLevelUp--; openLevelUp(); }
}
function onBossActivate(e){ SFX.boss(); document.getElementById('bossname').textContent=e.label; document.getElementById('bosshpwrap').classList.add('on'); updateBossBar(e); }
function updateBossBar(e){ document.querySelector('#bosshp > i').style.width=Math.max(0,e.hp/e.maxHp*100)+'%'; }
function bossShoot(e,p){
  const cfg=e.shot, ox=e.x+e.face*10, ojy=e.jy+e.h*0.62;
  const dx=p.x-ox, dirX=Math.sign(dx)||1, t=Math.max(0.25,Math.abs(dx)/cfg.speed);
  for(let i=0;i<cfg.count;i++){
    const fan=(cfg.count>1?(i-(cfg.count-1)/2)*cfg.spread*260:0); // multi-shots fan across depth
    const vx=dirX*cfg.speed, vz=(p.z-e.z)/t+fan;
    let vjy=((p.jy+p.h*0.5)-ojy)/t; if(cfg.gravity) vjy+=cfg.gravity*0.5*t;
    G.projectiles.push({owner:'enemy',x:ox,z:e.z,jy:ojy,vx,vz,vjy,gravity:cfg.gravity||0,size:cfg.size,color:cfg.color,shape:cfg.shape,glow:cfg.glow||1,dmg:e.dmg*0.8,kb:120,pierce:0,el:cfg.el||null,life:2.6,hitSet:[]});
  }
  if(cfg.el) SFX.magic(cfg.el); else SFX.shoot();
}
function updateBoss(e,dt,p,dir,eff){
  e.jy=0; updateBossBar(e);
  if(e.atkTimer>0) e.atkTimer-=dt; if(e.shootT>0) e.shootT-=dt;
  const dist=Math.abs(p.x-e.x), dzs=Math.sign(p.z-e.z)||0;
  e.z+=dzs*Math.min(Math.abs(p.z-e.z),eff*0.5*dt);
  if(e.lunge>0){ e.lunge-=dt; e.x+=dir*eff*2.6*dt; }
  else {
    if(e.kite && dist<210) e.x-=dir*eff*0.6*dt; else e.x+=dir*eff*0.7*dt;
    if(!e.kite && dist<240 && Math.abs(p.z-e.z)<60 && e.atkTimer<=0){ e.lunge=0.45; e.atkTimer=1.8; G.shake=Math.min(G.shake+5,11); }
  }
  if(e.ranged && e.shootT<=0 && dist<2000){ bossShoot(e,p); e.shootT=e.shootCd*(e.phase>=2?0.7:1); }
  if(e.type==='king'||e.type==='tyrant'){
    e.summonT-=dt;
    if(e.summonT<=0 && e.hp/e.maxHp<0.7){ e.summonT=e.type==='tyrant'?5:6;
      for(let i=0;i<2;i++){ const ne=spawnEnemy(Math.random()<0.5?'grunt':'flyer',e.x+(i?70:-70)); ne.active=true; }
      addText(e.x,gy(e.z)-e.h-10,'SUMMON!','var(--danger)',true); }
  }
  if(e.hp/e.maxHp<0.35 && e.phase<2){ e.phase=2; e.speed*=1.22;
    if(e.type==='king'){ e.ranged=true; e.shot={count:3,spread:0.22,speed:380,size:8,color:'#c47bff',shape:'orb',el:'void',glow:1}; e.shootCd=2.0; e.shootT=0.8; }
    addText(e.x,gy(e.z)-e.h-20,'ENRAGED!','var(--danger)',true); }
}

/* ============================================================ STAGE FLOW */
function nextStage(){
  if(!G.tookDamage){ meta.flawlessStages=(meta.flawlessStages||0)+1; }
  const ni=G.stageIndex+1; if(ni>=STAGES.length){ winGame(); return; }
  meta.bestStage=Math.max(meta.bestStage,ni); meta.run={ngPlus:G.ngPlus,ngHp:G.ngHp,ngDmg:G.ngDmg,stageIndex:ni,p:snapshotPlayer(),base:G.baseLoadout};
  persist(); checkAchievements(); loadStage(ni); SFX.pickup();
}
function snapshotPlayer(){ return snapOf(G.p); }
function restorePlayer(snap){ const p=G.p; Object.assign(p,snap,{stats:Object.assign(p.stats,snap.stats)});
  if(!p.weapon||typeof p.weapon!=='object'||!p.weapon.cls) p.weapon=startWeapon();
  p.gear=cloneGear(snap.gear); recomputeArmor(p); p.hp=Math.min(snap.hp,effMaxHp(p));
  p.x=70;p.z=DEPTH*0.55;p.jy=0;p.vx=0;p.vz=0;p.vy=0;p.onGround=true;p.atkTimer=0;p.atkCd=0;p.invuln=0;p.dead=false; }
function continueRun(){
  if(!meta.run) return; initAudio(); queueLevelUp=0;
  G={p:freshPlayer(),stageIndex:0,enemies:[],particles:[],texts:[],pickups:[],projectiles:[],cam:0,shake:0,
     ngPlus:meta.run.ngPlus,ngHp:meta.run.ngHp||1,ngDmg:meta.run.ngDmg||1,baseLoadout:meta.run.base||null,portal:null,stageBanner:0,killGoal:0,kills:0,boss:null,time:0,tookDamage:false};
  restorePlayer(meta.run.p); loadStage(meta.run.stageIndex); restorePlayer(meta.run.p);
  if(!G.baseLoadout) G.baseLoadout=snapOf(G.p);
  mode='play'; showOverlay(false); showGameUI(true); hudUpdate();
}

  {n:'Vitality',d:'+25 Max HP and heal 25',icon:'❤',apply:p=>{p.maxHp+=25;p.hp+=25;}},
  {n:'Power',d:'+18% weapon damage',icon:'⚔',apply:p=>{p.stats.power*=1.18;}},
  {n:'Swiftness',d:'+12% move speed',icon:'»',apply:p=>{p.stats.speed*=1.12;}},

  {n:'Lifedrain',d:'+8% lifesteal',icon:'✛',apply:p=>{p.stats.lifesteal+=0.08;}},

function pick3(){

function fmt(n){ return Math.round(n*100)/100; }
let _offerT=0;

function winGame(){

  meta.ngPlus=Math.max(meta.ngPlus,ng); meta.run=null; persist(); checkAchievements();
  showOverlayHTML(`<div class="card"><h2 class="title">VICTORY</h2>

/* ============================================================ RENDER */
function render(){
  const s=STAGES[G?G.stageIndex:0];
  ctx.clearRect(0,0,VW,VH);
  const grd=ctx.createLinearGradient(0,0,0,VH); grd.addColorStop(0,s?s.sky:'#13151d'); grd.addColorStop(1,'#070809');
  ctx.fillStyle=grd; ctx.fillRect(0,0,VW,VH);
  if(!G) return;
  const shx=(Math.random()-0.5)*G.shake, shy=(Math.random()-0.5)*G.shake;
  ctx.save(); ctx.translate(-G.cam+shx,shy);
  drawParallax(s); drawGround(s);
  if(G.portal) drawPortal(G.portal);
  // ambient weather (behind entities)
  if(G.ambient){ for(const a of G.ambient){ ctx.globalAlpha=Math.min(0.7,a.life*0.4); ctx.fillStyle=a.c; ctx.fillRect(a.x-a.sz/2,a.y-a.sz/2,a.sz,a.sz); } ctx.globalAlpha=1; }
  // painter's sort: far (low z) drawn first
  const draws=[];
  for(const pk of G.pickups) draws.push({z:(pk.z==null?DEPTH/2:pk.z),f:()=>drawPickup(pk)});
  for(const e of G.enemies){ if(!e.dead) draws.push({z:e.z,f:()=>drawEnemy(e)}); }
  draws.push({z:G.p.z,f:()=>drawHero(G.p)});
  for(const pr of G.projectiles) draws.push({z:pr.z,f:()=>drawProjectile(pr)});
  draws.sort((a,b)=>a.z-b.z);
  for(const d of draws) d.f();
  for(const pt of G.particles){ ctx.globalAlpha=Math.max(0,pt.life*2.5); ctx.fillStyle=pt.color; ctx.fillRect(pt.x-pt.sz/2,pt.y-pt.sz/2,pt.sz,pt.sz); }
  ctx.globalAlpha=1;
  for(const t of G.texts){ ctx.globalAlpha=Math.max(0,t.life*1.4); ctx.fillStyle=t.color.startsWith('var')?cssvar(t.color):t.color;
    ctx.font=`800 ${t.big?20:14}px -apple-system,sans-serif`; ctx.textAlign='center'; ctx.fillText(t.txt,t.x,t.y); }
  ctx.globalAlpha=1; ctx.restore();
  // combo counter
  if(mode==='play' && G.combo>=3){ ctx.textAlign='center'; ctx.fillStyle=cssvar('var(--amber)');
    ctx.font='900 '+(15+Math.min(6,G.combo*0.2))+'px -apple-system,sans-serif';
    ctx.globalAlpha=Math.min(1,G.comboT); ctx.fillText(G.combo+' HITS',VW/2,VH*0.22); ctx.globalAlpha=1; }
  // stage progress
  const pf=document.getElementById('progfill'); if(pf) pf.style.width=Math.min(100,G.p.x/STAGES[G.stageIndex].len*100)+'%';
  if(G.stageBanner>0){ const a=Math.min(1,G.stageBanner)*Math.min(1,(2.6-G.stageBanner)*3);
    ctx.globalAlpha=Math.max(0,a); ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='900 26px -apple-system,sans-serif'; ctx.fillText(s.name.toUpperCase(),VW/2,VH*0.34);
    ctx.fillStyle=cssvar('var(--amber)'); ctx.font='800 12px -apple-system,sans-serif'; ctx.fillText('STAGE '+(G.stageIndex+1)+' / '+STAGES.length,VW/2,VH*0.34+22);
    ctx.globalAlpha=1; }
}
const _cssCache={};
function cssvar(v){ const k=v.replace(/var\(|\)/g,'').trim(); if(!_cssCache[k]) _cssCache[k]=getComputedStyle(document.documentElement).getPropertyValue(k).trim()||'#fff'; return _cssCache[k]; }
function rr2(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function roundRect(x,y,w,h,r){ rr2(ctx,x,y,w,h,r); }
function shadowEllipse(cx,gy,w){ ctx.save(); ctx.globalAlpha=0.28; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(cx,gy,w,w*0.28,0,0,6.28); ctx.fill(); ctx.restore(); }
function eyes(cx,cy,dark,glow){ ctx.fillStyle=glow||'#fff'; ctx.beginPath(); ctx.arc(cx-6,cy,3.4,0,6.28); ctx.arc(cx+6,cy,3.4,0,6.28); ctx.fill();
  ctx.fillStyle=dark||'#000'; ctx.beginPath(); ctx.arc(cx-5,cy,1.6,0,6.28); ctx.arc(cx+7,cy,1.6,0,6.28); ctx.fill(); }
function tint(a,b,t){ const pa=hx(a),pb=hx(b); return 'rgb('+Math.round(pa[0]+(pb[0]-pa[0])*t)+','+Math.round(pa[1]+(pb[1]-pa[1])*t)+','+Math.round(pa[2]+(pb[2]-pa[2])*t)+')'; }
function hx(c){ c=c.replace('#',''); if(c.length===3) c=c.split('').map(x=>x+x).join(''); return [parseInt(c.substr(0,2),16),parseInt(c.substr(2,2),16),parseInt(c.substr(4,2),16)]; }

/* themed parallax */
function drawParallax(s){
  const cam=G.cam, base=GROUND_FAR, th=s.theme;
  if(th==='void'||th==='apex'){ ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<60;i++){ const x=((i*137)%(VW+200))+ -((cam*0.2)%(VW+200)); const y=(i*53)%(base-40); ctx.globalAlpha=0.2+0.5*((i*0.13)%1); ctx.fillRect(x,y,2,2);} ctx.globalAlpha=1; }
  if(th==='volcano'){ const g=ctx.createLinearGradient(0,base-60,0,base); g.addColorStop(0,'rgba(255,90,30,0)'); g.addColorStop(1,'rgba(255,90,30,0.18)'); ctx.fillStyle=g; ctx.fillRect(cam-10,base-60,VW+20,60); }
  ctx.fillStyle='rgba(255,255,255,0.045)';
  for(let i=0;i<14;i++){ const px=(i*260)-(cam*0.4)%(14*260); peak(px,base,th,90+(i%3)*30,70); }
  ctx.fillStyle=(th==='void'||th==='apex')?'rgba(120,80,200,0.12)':'rgba(0,0,0,0.20)';
  for(let i=0;i<22;i++){ const px=(i*180)-(cam*0.65)%(22*180); midProp(px,base,th); }
}
function peak(px,base,th,h,w){
  if(th==='frost'){ ctx.beginPath(); ctx.moveTo(px,base); ctx.lineTo(px+w*0.5,base-h*1.3); ctx.lineTo(px+w,base); ctx.closePath(); ctx.fill(); }
  else if(th==='forest'){ ctx.beginPath(); ctx.moveTo(px,base); ctx.lineTo(px+w*0.5,base-h); ctx.lineTo(px+w,base); ctx.closePath(); ctx.fill(); ctx.fillRect(px+w*0.45,base-h*0.3,w*0.1,h*0.3); }
  else { ctx.beginPath(); ctx.moveTo(px,base); ctx.lineTo(px+w*0.45,base-h); ctx.lineTo(px+w,base); ctx.closePath(); ctx.fill(); }
}
function midProp(px,base,th){
  if(th==='ruins'||th==='dungeon'){ ctx.fillRect(px,base-150,22,150); ctx.fillRect(px-6,base-160,34,12); }
  else if(th==='forest'){ ctx.fillRect(px+8,base-120,8,120); ctx.beginPath(); ctx.moveTo(px-6,base-90); ctx.lineTo(px+12,base-150); ctx.lineTo(px+30,base-90); ctx.closePath(); ctx.fill(); }
  else if(th==='canyon'||th==='badlands'){ ctx.fillRect(px,base-110,40,110); }
  else { ctx.fillRect(px,base-130,24,130); }
}
function drawGround(s){
  const len=s.len;
  // walkable depth band with a subtle far-to-near lighting gradient
  const g=ctx.createLinearGradient(0,GROUND_FAR,0,VH);
  g.addColorStop(0,tint(s.ground,'#000',0.35)); g.addColorStop(0.5,s.ground); g.addColorStop(1,tint(s.ground,'#000',0.12));
  ctx.fillStyle=g; ctx.fillRect(0,GROUND_FAR,len,VH-GROUND_FAR+40);
  ctx.fillStyle='rgba(255,255,255,0.09)'; ctx.fillRect(0,GROUND_FAR,len,3); // horizon edge
  // depth guide lines across the band
  ctx.fillStyle='rgba(0,0,0,0.12)';
  for(let k=1;k<4;k++){ ctx.fillRect(0,gy(k*DEPTH/4),len,1.5); }
  // ground ticks (denser/larger near)
  ctx.fillStyle='rgba(0,0,0,0.16)';
  for(let x=Math.floor(G.cam/46)*46;x<G.cam+VW+46;x+=46){ ctx.fillRect(x,gy(DEPTH*0.2),2,7); ctx.fillRect(x+20,gy(DEPTH*0.72),3,10); }
}
function drawPortal(po){
  const t=po.t; ctx.save(); ctx.translate(po.x,gy(DEPTH*0.55));
  for(let i=0;i<3;i++){ ctx.globalAlpha=0.5-i*0.12; ctx.fillStyle=cssvar('var(--amber)'); const r=42+i*12+Math.sin(t*3+i)*5;
    ctx.beginPath(); ctx.ellipse(0,-58,r*0.55,r,0,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.font='800 11px -apple-system'; ctx.textAlign='center'; ctx.fillText('ENTER →',0,-130); ctx.restore();
}
function drawPickup(pk){
  const it=pk.weapon||pk.armor, rc=RARITY[it.rarity].color, z=(pk.z==null?DEPTH/2:pk.z), s=scaleAt(z);
  ctx.save(); ctx.translate(pk.x,gy(z)); ctx.scale(s,s);
  shadowEllipse(0,2,12);
  ctx.translate(0,-26+Math.sin(pk.bob)*5);
  ctx.globalAlpha=0.16; ctx.fillStyle=rc; ctx.fillRect(-4,-44,8,64);
  ctx.globalAlpha=0.55; ctx.shadowColor=rc; ctx.shadowBlur=12; ctx.fillStyle=rc; ctx.beginPath(); ctx.arc(0,0,13,0,6.28); ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1;
  if(pk.weapon){ ctx.rotate(-0.6); ctx.translate(-7,4); drawWeaponArt(pk.weapon); }
  else { drawGearIcon(pk.armor); }
  ctx.restore();
}
function drawGearIcon(a){
  ctx.save(); ctx.shadowColor=a.color; ctx.shadowBlur=6; ctx.fillStyle='#cfd6df';
  if(a.slot==='helmet'){ ctx.beginPath(); ctx.arc(0,0,8,Math.PI,0); ctx.lineTo(8,5); ctx.lineTo(-8,5); ctx.closePath(); ctx.fill(); ctx.fillStyle=a.color; ctx.fillRect(-8,3,16,2.5); }
  else if(a.slot==='legs'){ ctx.fillStyle='#cfd6df'; ctx.fillRect(-7,-8,5,16); ctx.fillRect(2,-8,5,16); ctx.fillStyle=a.color; ctx.fillRect(-7,-8,14,3); }
  else { ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(8,-5); ctx.lineTo(8,3); ctx.quadraticCurveTo(0,11,-8,3); ctx.lineTo(-8,-5); ctx.closePath(); ctx.fill(); ctx.fillStyle=a.color; ctx.fillRect(-2,-6,4,11); }
  ctx.restore(); ctx.shadowBlur=0;
}
function drawProjectile(pr){
  const s=scaleAt(pr.z), sy=gy(pr.z)-pr.jy, ang=Math.atan2(-(pr.vjy||0)+(pr.vz||0)*0.6,pr.vx);
  ctx.save();
  // ground shadow under airborne shots
  ctx.globalAlpha=0.16; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(pr.x,gy(pr.z),pr.size*0.8,pr.size*0.3,0,0,6.28); ctx.fill(); ctx.globalAlpha=1;
  ctx.translate(pr.x,sy); ctx.scale(s,s);
  if(pr.glow){ ctx.shadowColor=pr.color; ctx.shadowBlur=10; } ctx.fillStyle=pr.color;
  if(pr.shape==='arrow'){ ctx.rotate(ang); ctx.fillRect(-8,-1.4,15,2.8); ctx.beginPath(); ctx.moveTo(8,-3); ctx.lineTo(13,0); ctx.lineTo(8,3); ctx.closePath(); ctx.fill(); }
  else if(pr.shape==='bolt'){ ctx.rotate(ang); ctx.fillRect(-8,-1.6,16,3.2); }
  else { ctx.beginPath(); ctx.arc(0,0,pr.size,0,6.28); ctx.fill(); ctx.globalAlpha=0.4; ctx.beginPath(); ctx.arc(-pr.vx*0.012,(pr.vjy||0)*0.012,pr.size*0.7,0,6.28); ctx.fill(); }
  ctx.restore(); ctx.shadowBlur=0;
}

/* ---------------- Weapon art ---------------- */
function lineC(c,a,b,cc,d){ c.beginPath(); c.moveTo(a,b); c.lineTo(cc,d); c.stroke(); }
function triC(c,x1,y1,x2,y2,x3,y3){ c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.lineTo(x3,y3); c.closePath(); c.fill(); }
function drawWeaponArt(w){ drawWeaponArtOn(ctx,w); }
function drawWeaponArtOn(c,w){
  const mag=w.sch==='mag', blade=w.blade||(mag?(elementColor(w.el)||'#c9a6ff'):'#dfe5ec'), hilt='#6b5430';

    ctx.strokeStyle='#fff'; ctx.lineWidth=2; lineP(-7,-H*0.34,-3,-H*0.32); lineP(7,-H*0.34,3,-H*0.32); }
  else if(e.type==='warden'){ ctx.fillStyle=tint(col,'#000',0.3); ctx.beginPath(); ctx.moveTo(-W/2,-H); ctx.lineTo(0,-H-18); ctx.lineTo(W/2,-H); ctx.closePath(); ctx.fill();

  else if(e.type==='sorcerer'){ ctx.fillStyle=tint(col,'#000',0.35); ctx.beginPath(); ctx.moveTo(-W*0.42,-H); ctx.lineTo(0,-H-24); ctx.lineTo(W*0.42,-H); ctx.closePath(); ctx.fill();

    ctx.fillStyle='#fff'; for(let i=0;i<10;i++){ ctx.globalAlpha=0.3+0.5*Math.abs(Math.sin(t*2+i)); ctx.fillRect(-W/2+6+(i*97%(W-12)),-H+8+(i*53%(H-16)),1.6,1.6);} ctx.globalAlpha=1;

    eyes(0,-H*0.76,'#100',en?'#ff3b6b':'#c47bff'); eyes(0,-H*0.54,'#100','#c47bff'); eyes(0,-H*0.34,'#100','#c47bff'); ctx.restore(); }
  else eyes(0,-H*0.7,'#400',eyeGlow);

/* ============================================================ MAIN LOOP */
function ensureSize(){ if(VW!==window.innerWidth||VH!==window.innerHeight||canvas.width===0) resize(); }
function frame(ts){ ensureSize(); if(!lastT) lastT=ts; let dt=(ts-lastT)/1000; lastT=ts; if(dt>0.05) dt=0.05; acc+=dt; while(acc>=DT){ update(DT); acc-=DT; } render(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
// self-updater: when the live deploy has a newer VERSION, refresh once so the home-screen PWA never runs stale
let _updating=false;
function checkUpdate(){
  if(_updating) return;
  fetch('index.html?_='+Date.now(),{cache:'no-store'}).then(r=>r.ok?r.text():'').then(t=>{
    const m=t.match(/const VERSION='([^']+)'/);
    if(m && m[1]!==VERSION){ let tried; try{tried=sessionStorage.getItem('bf_upd');}catch(e){}
      if(tried!==m[1]){ try{sessionStorage.setItem('bf_upd',m[1]);}catch(e){} _updating=true; toast('Updating to v'+m[1]+'…'); setTimeout(()=>location.reload(),700); } }
  }).catch(()=>{});
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'){ resize(); lastT=0; checkUpdate(); } });
titleScreen();
setTimeout(checkUpdate,2500);
window.addEventListener('pointerdown',initAudio,{once:true});

/* debug hook (headless verification) */
window.__BF={ resize,render,update,input,startRun,beginRun,continueRun,loadStage:i=>loadStage(i),stageCount:STAGES.length,
  giveWeapon:(a,r,n)=>{ if(G&&G.p){ G.p.weapon=makeWeapon(a,r,n); hudUpdate(); return G.p.weapon.name; } },

  setSkin:(s)=>{ if(G&&G.p){ if(!meta.unlockedSkins.includes(s)) meta.unlockedSkins.push(s); G.p.skin=s; recomputeArmor(G.p); if(s==='god') G.p.hp=effMaxHp(G.p); hudUpdate(); return G.p.skin; } },
  cheatTap:(id)=>registerCheatTap(id), godSeq:GOD_SEQ.slice(),
  makeWeapon, makeArmor, rollRarity, rollDrop:e=>rollDrop(e), elemMod, powerScore, computeNgScales, archeIds:ARCHEIDS, skinIds:Object.keys(SKINS),
  get G(){return G;}, get mode(){return mode;}, get meta(){return meta;},
  snap(){ const p=G&&G.p; return { mode,VW,VH,canvasW:canvas.width,
    p:p&&{x:Math.round(p.x),z:Math.round(p.z),jy:Math.round(p.jy),onGround:p.onGround,hp:Math.round(p.hp),maxHp:p.maxHp,effMaxHp:Math.round(effMaxHp(p)),lvl:p.level,xp:Math.round(p.xp),
      weapon:p.weapon&&{name:p.weapon.name,cls:p.weapon.cls,sch:p.weapon.sch,rarity:p.weapon.rarity,dmg:p.weapon.dmg,el:p.weapon.el},
      gear:p.gear&&{helmet:p.gear.helmet&&p.gear.helmet.rarity,chest:p.gear.chest&&p.gear.chest.rarity,legs:p.gear.legs&&p.gear.legs.rarity,reduction:Math.round(defenseR(p)*100),totalDef:+totalDefense(p).toFixed(1)},
      power:+powerScore(p).toFixed(2),skin:p.skin},
    stage:G&&G.stageIndex, stageName:G&&STAGES[G.stageIndex].name, ngHp:G&&+G.ngHp.toFixed(2), ngDmg:G&&+G.ngDmg.toFixed(2),
    enemiesAlive:G&&G.enemies.filter(e=>!e.dead).length, enemyHp0:G&&(G.enemies[0]&&G.enemies[0].maxHp), enemyEls:G&&G.enemies.filter(e=>e.element).map(e=>e.element),
    projectiles:G&&G.projectiles.length, pickups:G&&G.pickups.length, pickupKinds:G&&G.pickups.map(p=>p.weapon?'W':'A').join(''),
    portal:G&&!!G.portal, queued:queueLevelUp, ngPlus:G&&G.ngPlus, lastNgHp:+(meta.lastNgHp||1).toFixed(2), lastNgDmg:+(meta.lastNgDmg||1).toFixed(2),
